user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  server_tokens off;
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  client_max_body_size 10M;

  # ── Logs ────────────────────────────────────────────────────
  log_format json escape=json
    '{ "time":"$time_iso8601", '
    '"remote":"$remote_addr", '
    '"method":"$request_method", '
    '"path":"$uri", '
    '"status":"$status", '
    '"size":"$body_bytes_sent", '
    '"referer":"$http_referer", '
    '"ua":"$http_user_agent" }';

  access_log /var/log/nginx/access.log json buffer=32k flush=5s;
  error_log  /var/log/nginx/error.log warn;

  # ── Rate limiting zones ─────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=login:10m rate=2r/s;

  # ── HTTP → HTTPS redirect ───────────────────────────────────
  server {
    listen 80;
    listen [::]:80;
    server_name _;

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS server ────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # ── SSL (descomentar cuando tengas certificados) ──────────
    # ssl_certificate     /etc/ssl/certs/fullchain.pem;
    # ssl_certificate_key /etc/ssl/private/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;
    # ssl_prefer_server_ciphers on;
    # ssl_session_cache   shared:SSL:10m;
    # ssl_session_timeout 10m;

    # ── Security headers ──────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── API ───────────────────────────────────────────────────
    location /Perla/api/ {
      limit_req zone=general burst=20 nodelay;

      proxy_pass http://backend:3000/api/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Rate limit más estricto para login ────────────────────
    location /Perla/api/auth/login {
      limit_req zone=login burst=5 nodelay;

      proxy_pass http://backend:3000/api/auth/login;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Uploads estáticos ─────────────────────────────────────
    location /Perla/uploads/ {
      proxy_pass http://backend:3000/uploads/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      expires 7d;
      add_header Cache-Control "public, immutable";
    }

    # ── Health check (sin rate limit) ─────────────────────────
    location /Perla/api/health {
      proxy_pass http://backend:3000/api/health;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Admin panel (Angular, futuro) ─────────────────────────
    # location /Perla/admin/ {
    #   alias /usr/share/nginx/html/;
    #   try_files $uri $uri/ /Perla/admin/index.html;
    # }

    # ── 404 ───────────────────────────────────────────────────
    location /Perla/ {
      return 404;
    }

    location / {
      return 404;
    }
  }
}
