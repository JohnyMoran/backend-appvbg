name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: /home/userdev/AppPerla/backend-appvbg

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Build and restart services
        run: |
          docker compose -f docker-compose.prod.yml up -d --build --remove-orphans

      - name: Prune old images
        run: |
          docker image prune -f
